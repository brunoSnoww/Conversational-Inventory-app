# Production / demo deploy — uvicorn, no dev volume mount.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
services:
  api:
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --workers
      - "2"
    volumes: []
    environment:
      DEBUG: "false"
