services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: db_inventory
    ports:
      - "5433:5432"
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
    volumes:
      - inventory_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d db_inventory"]
      interval: 2s
      timeout: 5s
      retries: 15

  powersync-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: db_powersync
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d db_powersync"]
      interval: 2s
      timeout: 5s
      retries: 15

  powersync:
    image: journeyapps/powersync-service:1.20.0
    command: ["start", "-r", "unified"]
    ports:
      - "2000:2000"
    environment:
      POWERSYNC_CONFIG_PATH: /app/config/config.yaml
    volumes:
      - ./powersync/config.yaml:/app/config/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      powersync-postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:2000/probes/liveness').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DJANGO_SECRET_KEY: dev-docker-secret
      DJANGO_DEBUG: "true"
      INVENTORY_DB_HOST: postgres
      INVENTORY_DB_PORT: "5432"
      INVENTORY_DB_NAME: db_inventory
      INVENTORY_DB_USER: postgres
      INVENTORY_DB_PASSWORD: postgres
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      POWERSYNC_URL: ${POWERSYNC_PUBLIC_URL:-http://localhost:2000}
      POWERSYNC_JWT_SECRET: inventory-dev-powersync-secret-key-32b
      POWERSYNC_JWT_AUDIENCE: ${POWERSYNC_PUBLIC_URL:-http://localhost:2000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]

volumes:
  inventory_pgdata:
